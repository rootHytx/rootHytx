name: Update Most Active Repos

on:
  push:
    branches: [main]
    paths:
      - "quotes.txt"
      - "scripts/**"
      - ".github/workflows/update-readme.yml"
  schedule:
    - cron: "0 */6 * * *" # Repo table refresh every 6 hours
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the updated README

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Update README
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update-repos.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Update most active repos"
          git push
